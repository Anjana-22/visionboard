<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vision Board </title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Caveat:wght@500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<main>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <p class="eyebrow">My Vision Board</p>
    <h1 class="title">This Year,<br><em>I will…</em></h1>
    <p class="title-sub" id="yearSubtitle"></p>
  </div>
  <div class="header-actions">
    <div class="year-ring-wrap" aria-label="Year progress">
      <svg class="ring-svg" viewBox="0 0 40 40" role="img" aria-hidden="true">
        <circle class="ring-track" cx="20" cy="20" r="18"/>
        <circle class="ring-fill" id="ringFill" cx="20" cy="20" r="18"/>
        <text class="ring-text" x="20" y="24" text-anchor="middle" id="ringPct"></text>
      </svg>
      <div class="ring-label">Year<br><strong id="ringDays"></strong></div>
    </div>
    <button class="btn btn-ghost btn-icon theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
      <svg class="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
    <button class="btn btn-primary" id="openModal" aria-label="Add new card">
      <span aria-hidden="true">+</span> Add Card
    </button>
  </div>
</div>

<!-- STATS -->
<div class="stats" id="stats" role="status" aria-live="polite"></div>

<!-- CONTROLS -->
<div class="controls">
  <div class="filters" id="filters" role="group" aria-label="Filter by category"></div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" placeholder="Search cards…" aria-label="Search cards" type="search"/>
  </div>
</div>

<!-- GRID -->
<div class="grid" id="grid" role="list" aria-label="Vision board cards"></div>

</main>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay hidden" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-box">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Add to Board</h2>
      <button class="modal-close" id="closeModal" aria-label="Close modal">×</button>
    </div>
    <div class="type-tabs" role="tablist" aria-label="Card type">
      <button class="type-tab active" data-type="goal"      role="tab" aria-selected="true">🎯 Goal</button>
      <button class="type-tab"        data-type="image"     role="tab" aria-selected="false">🖼️ Image</button>
      <button class="type-tab"        data-type="checklist" role="tab" aria-selected="false">✅ Checklist</button>
      <button class="type-tab"        data-type="deadline"  role="tab" aria-selected="false">⏳ Deadline</button>
    </div>
    <div class="form-group" id="formGroup">
      <!-- dynamically rendered by script.js -->
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
